<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HELLO WORLD keyboard">
  <title>HELLO WORLD</title>
  <defs>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0b0f14"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .cap{fill:url(#cap);stroke:#00CC69;stroke-width:2;animation:press 3.6s ease-in-out infinite}
    .ltr{fill:#00CC69;font-family:'Fira Code','Courier New',monospace;font-size:22px;font-weight:700;text-anchor:middle;dominant-baseline:central;transform-box:fill-box;transform-origin:center;filter:url(#glow);animation:spin 3.6s ease-in-out infinite}
    @keyframes spin{0%{transform:rotate(0)}18%{transform:rotate(360deg)}100%{transform:rotate(360deg)}}
    @keyframes press{0%,100%{stroke:#00CC69;stroke-width:2}9%{stroke:#7CFFB0;stroke-width:2.8}18%{stroke:#00CC69;stroke-width:2}}
    #k1,#t1{animation-delay:0s}#k2,#t2{animation-delay:.13s}#k3,#t3{animation-delay:.26s}#k4,#t4{animation-delay:.39s}#k5,#t5{animation-delay:.52s}
    #k6,#t6{animation-delay:.65s}#k7,#t7{animation-delay:.78s}#k8,#t8{animation-delay:.91s}#k9,#t9{animation-delay:1.04s}#k10,#t10{animation-delay:1.17s}
  </style>
  <rect id="k1" class="cap" x="10" y="10" width="60" height="60" rx="8"/>
  <rect id="k2" class="cap" x="80" y="10" width="60" height="60" rx="8"/>
  <rect id="k3" class="cap" x="150" y="10" width="60" height="60" rx="8"/>
  <rect id="k4" class="cap" x="220" y="10" width="60" height="60" rx="8"/>
  <rect id="k5" class="cap" x="290" y="10" width="60" height="60" rx="8"/>
  <rect id="k6" class="cap" x="10" y="80" width="60" height="60" rx="8"/>
  <rect id="k7" class="cap" x="80" y="80" width="60" height="60" rx="8"/>
  <rect id="k8" class="cap" x="150" y="80" width="60" height="60" rx="8"/>
  <rect id="k9" class="cap" x="220" y="80" width="60" height="60" rx="8"/>
  <rect id="k10" class="cap" x="290" y="80" width="60" height="60" rx="8"/>
  <text id="t1" class="ltr" x="40" y="40">H</text>
  <text id="t2" class="ltr" x="110" y="40">E</text>
  <text id="t3" class="ltr" x="180" y="40">L</text>
  <text id="t4" class="ltr" x="250" y="40">L</text>
  <text id="t5" class="ltr" x="320" y="40">O</text>
  <text id="t6" class="ltr" x="40" y="110">W</text>
  <text id="t7" class="ltr" x="110" y="110">O</text>
  <text id="t8" class="ltr" x="180" y="110">R</text>
  <text id="t9" class="ltr" x="250" y="110">L</text>
  <text id="t10" class="ltr" x="320" y="110">D</text>
</svg>
