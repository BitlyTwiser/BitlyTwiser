name: Metrics
on:
  schedule: [{ cron: "0 6 * * *" }]    # rebuild once a day (06:00 UTC)
  workflow_dispatch:                   # lets you trigger it manually
  push:
    branches: ["main"]                 # rebuild on push to main
    paths-ignore:
      - "github-metrics.svg"           # avoid re-triggering on the SVG the action commits back

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write                  # required so the action can commit the SVG back
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: BitlyTwiser
          filename: github-metrics.svg

          # --- look ---
          template: terminal           # green-on-dark terminal style (swap to "classic" for the standard card look)
          config_timezone: America/Los_Angeles

          # --- sections (this replaces the old "stats" card) ---
          base: header, activity, community, repositories, metadata

          # --- top languages (this replaces the old "top languages" card) ---
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
